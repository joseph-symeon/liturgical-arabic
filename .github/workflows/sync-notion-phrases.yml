name: Sync Notion Phrases

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync phrases from Notion
        run: npm run sync:notion:phrases
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PHRASES_DATABASE_ID: ${{ secrets.NOTION_PHRASES_DATABASE_ID }}
          NOTION_PHRASES_STATUS: ${{ secrets.NOTION_PHRASES_STATUS }}

      - run: npm run build

      - name: Commit synced phrase data
        run: |
          git add src/data/source/phrases.csv src/data/phrases.js

          if git diff --cached --quiet; then
            echo "No phrase data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync phrases from Notion"
          git push
