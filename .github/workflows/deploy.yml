name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Sync phrases from Notion when configured
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PHRASES_DATABASE_ID: ${{ secrets.NOTION_PHRASES_DATABASE_ID }}
          NOTION_PHRASES_STATUS: ${{ secrets.NOTION_PHRASES_STATUS }}
        run: |
          if [ -n "$NOTION_TOKEN" ] && [ -n "$NOTION_PHRASES_DATABASE_ID" ]; then
            npm run sync:notion:phrases -- --force
          else
            echo "Notion secrets not configured; using committed phrase snapshot."
          fi
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
