<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arabic Liturgy Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lateef:wght@300;400;600&family=Noto+Naskh+Arabic:wght@400;500;600&family=Noto+Sans+Arabic:wght@300;400;600&family=Scheherazade+New:wght@400;600&display=swap" rel="stylesheet">
  </head>
  <style>
    :root {
      --rubric-red: #b91c1c;
      --liturgical-red: var(--rubric-red);
      --liturgical-red-decoration: var(--rubric-red);
    }

    .liturgical-red {
      color: var(--liturgical-red) !important;
    }

    .liturgical-red-decoration {
      text-decoration-color: var(--liturgical-red-decoration);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --rubric-red: #f87171;
        --liturgical-red: var(--rubric-red);
        --liturgical-red-decoration: var(--rubric-red);
      }

      body { background: #1c1917; }
    }
  </style>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
