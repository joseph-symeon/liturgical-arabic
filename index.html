<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arabic Liturgy Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lateef:wght@300;400;600&family=Noto+Naskh+Arabic:wght@400;500;600&family=Noto+Sans+Arabic:wght@300;400;600&family=Scheherazade+New:wght@400;600&display=swap" rel="stylesheet">
  </head>
  <style>
    :root {
      --rubric-red: #b91c1c;
      --liturgical-red: var(--rubric-red);
      --liturgical-red-control: var(--liturgical-red);
      --liturgical-red-control-fill: var(--liturgical-red-control);
      --liturgical-red-highlight-fill: color-mix(in srgb, var(--liturgical-red-control) 16%, transparent);
      --liturgical-red-toggle-fill: color-mix(in srgb, var(--liturgical-red-control) 75%, transparent);
      --liturgical-red-highlight-ring: color-mix(in srgb, var(--liturgical-red-control) 12%, transparent);
      --liturgical-red-decoration: var(--rubric-red);
      --dark-bg: #181a1b;
      --dark-surface: #1f2223;
      --dark-hover: #25292b;
      --dark-active: #2b3032;
      --dark-border: #3d4447;
      --dark-text: #e8e6e3;
      --dark-muted: #b2aba1;
    }

    .liturgical-red {
      color: var(--liturgical-red) !important;
    }

    .liturgical-red-decoration {
      text-decoration-color: var(--liturgical-red-decoration);
    }

    * {
      scrollbar-color: rgba(120, 113, 108, 0.55) transparent;
    }

    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    *::-webkit-scrollbar-track {
      background: transparent;
    }

    *::-webkit-scrollbar-thumb {
      background-color: rgba(120, 113, 108, 0.55);
      border: 3px solid transparent;
      border-radius: 999px;
      background-clip: content-box;
    }

    *::-webkit-scrollbar-thumb:hover {
      background-color: rgba(120, 113, 108, 0.75);
    }

    *::-webkit-scrollbar-corner {
      background: transparent;
    }

    .page-nav {
      border-top: 1px solid #e7e5e4;
      container-type: inline-size;
      padding-top: 14px;
    }

    .page-nav-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    .page-nav-button {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      min-height: 54px;
      min-width: 0;
      overflow: hidden;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font: inherit;
      line-height: 1.25;
      padding: 8px 10px;
    }

    .page-nav-button:hover:not(:disabled) {
      background: #f5f5f4;
    }

    .page-nav-button:disabled {
      cursor: default;
      opacity: 0.38;
    }

    .page-nav-button-start {
      align-items: flex-start;
      justify-self: stretch;
      text-align: left;
    }

    .page-nav-button-center {
      align-items: center;
      justify-self: center;
      min-width: 128px;
      text-align: center;
    }

    .page-nav-button-end {
      align-items: flex-end;
      justify-self: stretch;
      text-align: right;
    }

    .page-nav-label {
      display: block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.2;
    }

    .page-nav-destination {
      display: block;
      width: 100%;
      max-width: 100%;
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #78716c;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.25;
    }

    .bottom-nav-page {
      display: flex;
      min-height: calc(100svh - 120px);
      flex-direction: column;
    }

    .bottom-page-nav.page-nav {
      margin-top: auto;
    }

    .bottom-nav-page > .lp-passage-experience {
      margin-bottom: 56px;
    }

    @media (max-width: 900px) {
      .app-content {
        padding-top: calc(env(safe-area-inset-top, 0px) + 52px);
      }
    }

    @container (max-width: 520px) {
      .page-nav-grid {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 8px;
      }

      .page-nav-button-center {
        grid-column: 1 / -1;
        grid-row: 2;
        width: 100%;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --rubric-red: #f87171;
        --liturgical-red: var(--rubric-red);
        --liturgical-red-control: #b91c1c;
        --liturgical-red-control-fill: color-mix(in srgb, var(--liturgical-red-control) 62%, transparent);
        --liturgical-red-highlight-fill: color-mix(in srgb, var(--liturgical-red-control) 34%, transparent);
        --liturgical-red-highlight-ring: color-mix(in srgb, var(--liturgical-red-control) 24%, transparent);
        --liturgical-red-decoration: var(--rubric-red);
      }

      html,
      body {
        background: var(--dark-bg);
        color: var(--dark-text);
      }

      .page-nav {
        border-top-color: var(--dark-border);
      }

      .page-nav-button:hover:not(:disabled) {
        background: var(--dark-hover);
      }

      .page-nav-destination {
        color: var(--dark-muted);
      }

      * {
        scrollbar-color: rgba(178, 171, 161, 0.55) transparent;
      }

      *::-webkit-scrollbar-thumb {
        background-color: rgba(178, 171, 161, 0.55);
      }

      *::-webkit-scrollbar-thumb:hover {
        background-color: rgba(178, 171, 161, 0.75);
      }

    }
  </style>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
